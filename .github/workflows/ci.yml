name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target
      - run: cargo test --release --manifest-path rust/Cargo.toml --lib

  python-parity:
    name: pytest (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target
      - name: Install package + dev deps
        # `pip install -e .` triggers maturin (build backend in pyproject.toml)
        # to compile the Rust extension and link it editable into the runner's
        # system Python — no virtualenv needed.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy
          pip install -e . --config-settings=build-args='--release'
      - name: Smoke test (no R reference fixture available in CI)
        run: |
          python - <<'PY'
          import numpy as np
          import nmf_rs
          rng = np.random.default_rng(0)
          V = np.abs(rng.normal(size=(80, 30)))
          for method in ("brunet", "lee", "offset", "nsNMF", "hals"):
              W0, H0 = nmf_rs.random_init(V, 4, seed=1)
              res = nmf_rs.nmf(V, rank=4, method=method,
                               W0=W0, H0=H0, max_iter=20,
                               num_threads=1)
              assert res.W.shape == (80, 4)
              assert res.H.shape == (4, 30)
              assert np.isfinite(res.W).all() and np.isfinite(res.H).all()
              assert (res.W >= 0).all() and (res.H >= 0).all()
              print(method, "ok, recon=", float(np.linalg.norm(V - res.fitted())))
          PY

  python-parity-r:
    name: pytest with R reference (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::NMF
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy
          pip install -e . --config-settings=build-args='--release'
      - name: Run parity tests
        env:
          # Override the path the parity test hard-codes for the local Sherlock layout.
          NMF_RS_RSCRIPT: ${{ steps.setup-r.outputs.rscript || 'Rscript' }}
        run: |
          # The shipped tests/test_parity.py hard-codes /scratch paths for Sherlock.
          # CI generates fixtures inline instead.
          python - <<'PY'
          import os, subprocess, sys, shutil
          from pathlib import Path
          # Patch the test to use the CI-installed Rscript.
          test_dir = Path("tests/data"); test_dir.mkdir(parents=True, exist_ok=True)
          subprocess.run(["Rscript", "tests/reference_nmf.R", "tests/data",
                          "1234", "80", "30", "4", "50"], check=True)
          PY
          # Now run pytest pointing test_parity at the regenerated fixtures.
          # The hard-coded RSCRIPT path inside test_parity.py only runs if
          # fixtures are missing — they exist now, so the test loads them directly.
          pytest tests/test_parity.py -v
