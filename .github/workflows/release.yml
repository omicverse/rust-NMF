name: Release

# Build wheels for every supported platform on every tag push, then publish
# to PyPI. We use PyPI Trusted Publishing (no API token in repo secrets) —
# configure at https://pypi.org/manage/account/publishing/ before the first
# release: project name `nmf-rs`, owner `omicverse`, repo `rust-NMF`,
# workflow `release.yml`, environment `pypi`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------- Linux x86_64 + aarch64 (manylinux 2_28) ----------
  linux:
    name: wheel · linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path rust/Cargo.toml
          manylinux: 2_28
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ---------- macOS universal2 (x86_64 + arm64 in one wheel) ----------
  macos:
    name: wheel · macos universal2
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist --manifest-path rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist

  # ---------- Windows x86_64 ----------
  windows:
    name: wheel · windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64
      - uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --manifest-path rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  # ---------- Source distribution (cargo + python sources) ----------
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ---------- Publish to PyPI on tag push ----------
  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/nmf-rs
    permissions:
      id-token: write   # mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Trusted publishing — no `password` field; PyPI verifies via OIDC.
          # Set up at https://pypi.org/manage/account/publishing/
